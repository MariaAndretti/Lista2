<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de salário com bônus</title>
    <link rel="stylesheet" href="perfumaria.css">
</head>
<body>

    <div class="bonus-card">
        <h2>Cálculo de salário com bônus</h2>
        
        <div class="form-group">
            <label for="salarioInput">Salário Base (R$):</label>
            <input type="number" id="salarioInput" placeholder="Ex: 2000.00" step="0.01">
        </div>

        <div class="form-group">
            <label for="bonusPercInput">Percentual de Bônus (%):</label>
            <input type="number" id="bonusPercInput" placeholder="Ex: 10">
        </div>

        <button id="btnCalcular">Calcular Salário Final</button>

        <div id="resultadoArea">
            <div class="res-line"><span>Salário Base:</span> <span id="outSalario"></span></div>
            <div class="res-line"><span>Bônus (%):</span> <span id="outPerc"></span></div>
            <div class="res-line"><span>Valor do Bônus:</span> <span id="outValorBonus"></span></div>
            <div class="res-line total-line"><span>Salário Final:</span> <span id="outFinal"></span></div>
        </div>
    </div>

    <script src="salario.js"></script>
</body>
</html>
