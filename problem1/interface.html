<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de desconto em compras</title>
    <link rel="stylesheet" href="perfumaria.css">
</head>
<body>

   <div class="discount-card">
       <h2>Cálculo de desconto</h2>
      
       <div class="form-group">
           <label for="precoInput">Preço Original (R$):</label>
           <input type="number" id="precoInput" placeholder="Ex: 100.00" step="0.01">
       </div>

       <div class="form-group">
           <label for="descontoInput">Desconto (%):</label>
           <input type="number" id="descontoInput" placeholder="Ex: 10">
       </div>

       <button id="btnCalcular">Calcular Preço Final</button>

       <div id="resultadoArea">
           <div class="res-item">
               <span>Preço Base:</span> 
               <span id="outPreco"></span>
           </div>
           <div class="res-item">
               <span>Desconto Aplicado:</span> 
               <span id="outPerc"></span>
           </div>
           <div class="res-item">
               <span>Valor Descontado:</span> 
               <span id="outEconomia"></span>
           </div>
           <div class="res-item final-price">
               <span>Preço Final:</span> 
               <span id="outFinal"></span>
           </div>
       </div>
   </div>

   <script src="desconto.js"></script>
</body>
</html>
