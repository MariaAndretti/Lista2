<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de custo total de uma viagem</title>
    <link rel="stylesheet" href="perfumaria.css">
    </style>
</head>
<body>

    <div class="travel-card">
        <h2>Calculadora de Viagem</h2>
        
        <div class="form-group">
            <label for="distancia">Distância Total (km):</label>
            <input type="number" id="distancia" placeholder="Ex: 300" step="0.1">
        </div>

        <div class="form-group">
            <label for="consumo">Consumo Médio (km/L):</label>
            <input type="number" id="consumo" placeholder="Ex: 12" step="0.1">
        </div>

        <div class="form-group">
            <label for="preco">Preço do Combustível (R$):</label>
            <input type="number" id="preco" placeholder="Ex: 5.50" step="0.01">
        </div>

        <button id="btnCalcular">Calcular Custo Estimado</button>

        <div id="resultadoViagem">
            <div class="res-line"><span>Distância:</span> <span id="outDistancia"></span></div>
            <div class="res-line"><span>Consumo Médio:</span> <span id="outConsumo"></span></div>
            <div class="res-line"><span>Combustível Necessário:</span> <span id="outLitros"></span></div>
            <div class="res-line highlight-line"><span>Custo (Só Ida):</span> <span id="outCustoIda"></span></div>
            <div class="res-line highlight-line round-trip"><span>Custo (Ida e Volta):</span> <span id="outCustoTotal"></span></div>
        </div>
    </div>

    <script src="viagem.js"></script>
</body>
</html>
